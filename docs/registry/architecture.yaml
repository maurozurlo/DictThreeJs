#     revised: ""


# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: any_in_handler_files
    status: active
    description: "TypeScript `any` type is banned in Handler files (BudgetHandler, ActionHandler, EffectHandler, DailyEventHandler, and any future *Handler.ts files)."
    why: "Handlers contain the core game logic and must be fully type-safe. `any` breaks the contract that handler functions are testable pure functions."
    adr: docs/architecture/adr-0001-tech-stack-choice.md
    added: 2026-06-10

  - pattern: full_store_selector
    status: active
    description: "Components must never select the entire Zustand store object (e.g., `useGameStore(s => s)` or `useGameStore()` with no selector)."
    why: "Full-store selectors cause the component to re-render on every state change regardless of relevance, negating Zustand's fine-grained subscription benefit."
    adr: docs/architecture/adr-0001-tech-stack-choice.md
    added: 2026-06-10

  - pattern: handler_store_import
    status: active
    description: "Handler files (*Handler.ts) must not import from Stores/GameState.ts or call useGameStore directly."
    why: "Handlers must be pure functions testable without instantiating the store. Store coupling makes them impossible to unit-test in isolation."
    adr: docs/architecture/adr-0002-state-management-pattern.md
    added: 2026-06-10

  - pattern: inline_business_logic_in_set
    status: active
    description: "Multi-step business logic (formulas, probability, multi-faction effects) must not be written inline inside set() callbacks. Extract to a Handler function."
    why: "Inline logic in set() callbacks is untestable, hard to read, and creates the same problem as monolithic reducers — the reason the Handler pattern exists."
    adr: docs/architecture/adr-0002-state-management-pattern.md
    added: 2026-06-10

  - pattern: ui_imports_3d
    status: active
    description: "UI components (src/components/, src/Features/, src/Tabs/) must not import from src/3d/."
    why: "The 3D layer is a visual output driven by Zustand state. UI components should write to the store, not reach into the 3D layer directly. Cross-imports create bidirectional coupling that breaks when the scene is refactored."
    adr: docs/architecture/adr-0003-react-threejs-integration.md
    added: 2026-06-10

