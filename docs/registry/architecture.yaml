# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets: []

# Example:
#
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.6
#     platform: PC             # PC | Console | Mobile | All
#     adr: docs/architecture/adr-0000-performance-targets.md
#     added: 2026-03-26
#     revised: ""
#
#   - system: combat
#     status: active
#     budget_ms: 2.0
#     adr: docs/architecture/adr-0003-combat-system.md
#     notes: "Includes physics queries, hitbox evaluation, and damage calculation"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: store_access
    status: active
    api: useGameStore(selector)
    not: direct store import or accessing store.getState() outside handlers
    adr: docs/architecture/adr-0001-tech-stack-choice.md
    reason: "Fine-grained selectors prevent full-tree re-renders; components subscribe only to the slice they need"
    referenced_by:
      - docs/architecture/adr-0001-tech-stack-choice.md
    added: 2026-06-10
    revised: ""

  - purpose: 3d_rendering
    status: active
    api: React Three Fiber (@react-three/fiber) + @react-three/drei
    not: Raw Three.js without R3F
    adr: docs/architecture/adr-0001-tech-stack-choice.md
    reason: "R3F integrates with React Suspense and hooks, keeping 3D scene in the same component model as UI; drei provides camera helpers and loaders"
    referenced_by:
      - docs/architecture/adr-0001-tech-stack-choice.md
      - docs/architecture/adr-0003-react-threejs-integration.md
    added: 2026-06-10
    revised: "2026-06-10 — corrected from 'raw Three.js' after reading Scene.tsx"

# Example:
